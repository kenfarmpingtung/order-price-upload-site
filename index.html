<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ken's Farm | 屏東小農產地直送</title>
    <meta name="description" content="Ken's Farm 屏東小農產地直送，販售酪梨與芒果。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Ken's Farm home">
        <span id="brandName">Ken's Farm</span>
      </a>
      <nav aria-label="主要導覽">
        <a id="navProducts" href="#fruit-box">Fruit Box</a>
        <a id="navReserve" href="#reserve">Reserve</a>
        <a id="lineLink" class="social-link" href="#" target="_blank" rel="noopener" aria-label="Ken's Farm LINE" hidden>
          <span>LINE</span>
        </a>
        <a id="instagramLink" class="social-link" href="https://www.instagram.com/kenfarmpingtung?igsh=MXJubTk4NWR3MnA3Yg%3D%3D&utm_source=qr" target="_blank" rel="noopener" aria-label="Ken's Farm Instagram">
          <img src="assets/images/instagram.svg" alt="">
        </a>
      </nav>
    </header>

    <main id="top">
      <section class="section-heading" id="fruit-box">
        <p class="kicker" id="productsKicker">Fresh this week</p>
        <h2 id="productsTitle">This Week’s Fruit Box</h2>
      </section>

      <section class="product-grid" id="productGrid" aria-label="本週商品"></section>

      <section class="reserve-layout" id="reserve">
        <form class="checkout" id="orderForm" method="POST">
          <div class="section-heading compact">
            <p class="kicker" id="checkoutKicker">Checkout</p>
            <h2 id="checkoutTitle">Reserve Your Box</h2>
          </div>

          <input type="hidden" name="order_items" id="orderItemsInput">
          <input type="hidden" name="order_total" id="orderTotalInput">
          <input type="hidden" name="order_summary" id="orderSummaryInput">
          <input type="hidden" name="recipient_email" id="recipientEmailInput">
          <input type="hidden" name="formspree_endpoint" id="formspreeEndpointInput">
          <input type="text" name="_gotcha" class="honeypot" tabindex="-1" autocomplete="off">

          <div class="form-grid">
            <label>
              Name
              <input name="name" type="text" placeholder="Your name" required>
            </label>
            <label>
              Phone
              <input name="phone" type="tel" placeholder="0912-345-678" required>
            </label>
            <label>
              Email
              <input name="email" type="email" placeholder="name@example.com" required>
            </label>
            <label>
              Delivery
              <select name="delivery">
                <option>宅配</option>
                <option>屏東面交</option>
                <option>其他方式再聯絡</option>
              </select>
            </label>
          </div>

          <label>
            Address / Notes
            <textarea name="message" rows="5" placeholder="地址、希望熟度、可收貨時間，或其他需求"></textarea>
          </label>

          <div class="form-message" id="formMessage" role="status" aria-live="polite"></div>
          <button class="button submit" id="submitButton" type="submit">Send My Order</button>
        </form>

        <aside class="receipt-card" aria-label="訂單摘要">
          <div>
            <p class="kicker" id="receiptKicker">Receipt</p>
            <h2 id="receiptTitle">Your Box</h2>
          </div>
          <div id="cartItems" class="cart-items"></div>
          <div class="total-row">
            <span>Total</span>
            <strong id="cartTotal">NT$0</strong>
          </div>
          <button class="text-button" id="resetButton" type="button">Clear selection</button>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <img id="footerLogo" src="assets/images/logo.png" alt="" aria-hidden="true">
      <p id="footerText">Ken’s Farm · 屏東小農產地直送 · Avocado / Mango</p>
    </footer>

    <template id="productTemplate">
      <article class="product-card">
        <div class="product-image-wrap">
          <img class="product-image" alt="">
        </div>
        <div class="product-body">
          <div>
            <span class="product-unit"></span>
            <h3></h3>
            <p></p>
          </div>
          <div class="product-footer">
            <strong></strong>
            <div class="quantity-control">
              <button class="minus" type="button" aria-label="減少數量">-</button>
              <span>0</span>
              <button class="plus" type="button" aria-label="增加數量">+</button>
            </div>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
